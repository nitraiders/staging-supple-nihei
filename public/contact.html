<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | 株式会社ニヘイ・コーポレーション</title>
    <meta name="description" content="株式会社ニヘイ・コーポレーションへのお問い合わせページです。製品に関するご質問、お取引のご依頼などお気軽にご連絡ください。">
    <link rel="stylesheet" href="css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <h1 class="logo">
                <a href="index.html">NIHEI<span>Corp.</span></a>
            </h1>
            <nav class="nav" id="nav">
                <ul class="nav-list">
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="about.html">事業内容</a></li>
                    <li><a href="about.html">企業情報</a></li>
                    <li><a href="about.html">ニヘイ研究所</a></li>
                    <li><a href="product.html">脳覚</a></li>
                    <li><a href="index.html#news">ニュース</a></li>
                    <li><a href="contact.html" class="nav-cta">お問い合わせ</a></li>
                </ul>
            </nav>
            <button class="hamburger" id="hamburger" aria-label="メニューを開く">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main>
        <section class="page-header hero-small">
            <div class="hero-overlay"></div>
            <div class="hero-content container">
                <h2 class="hero-title">お問い合わせ <span>Contact</span></h2>
                <p class="hero-subtitle">お困りごとやご相談、お気軽にお寄せください</p>
            </div>
        </section>

        <section class="contact-section section-padding">
            <div class="container" style="max-width: 800px;">
                <p class="emphasize" style="text-align: center; margin-bottom: 40px;">製品に関するご質問やお取引のご相談は、<br>以下のフォームより承っております。</p>
                
                <form action="#" class="contact-form" style="background: #fdfdfd; padding: 40px; border: 1px solid #eee; border-radius: 15px;">
                    <div class="form-group" style="margin-bottom: 25px;">
                        <label style="display: block; font-weight: 700; margin-bottom: 10px;">お名前 <span style="color: var(--primary-color);">*</span></label>
                        <input type="text" placeholder="例：日本 太郎" style="width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 5px;" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 25px;">
                        <label style="display: block; font-weight: 700; margin-bottom: 10px;">メールアドレス <span style="color: var(--primary-color);">*</span></label>
                        <input type="email" placeholder="example@nihei-corp.jp" style="width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 5px;" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 25px;">
                        <label style="display: block; font-weight: 700; margin-bottom: 10px;">お問い合わせ項目 <span style="color: var(--primary-color);">*</span></label>
                        <select style="width: 100%; padding: 15px; border: 1px solid #ddd; border-top: none; border-left: none; border-right: none; background: white;" required>
                            <option value="">選択してください</option>
                            <option value="product">製品について</option>
                            <option value="business">お取引について</option>
                            <option value="other">その他</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 30px;">
                        <label style="display: block; font-weight: 700; margin-bottom: 10px;">お問い合わせ内容 <span style="color: var(--primary-color);">*</span></label>
                        <textarea rows="6" placeholder="お問い合わせ内容をご記入ください" style="width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 5px;" required></textarea>
                    </div>
                    <div class="btn-center">
                        <button type="submit" class="btn btn-primary" style="border: none; width: 100%;">この内容で送信する</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-top">
                <h2 class="logo-footer">NIHEI<span>Corp.</span></h2>
                <nav class="footer-nav">
                    <ul>
                        <li><a href="about.html">企業情報</a></li>
                        <li><a href="contact.html">お問い合わせ</a></li>
                        <li><a href="#">プライバシーポリシー</a></li>
                    </ul>
                </nav>
            </div>
            <p class="copyright">&copy; 2026 NIHEI Corporation. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/site-data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
